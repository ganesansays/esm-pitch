<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phoenix Digital Assistant — Secure Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Public+Sans:wght@600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: #101415;
      color: #e0e3e5;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
    }
    .grid-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(circle at 2px 2px, rgba(71, 85, 105, 0.12) 1px, transparent 0);
      background-size: 48px 48px;
    }
    .glow-a { position: fixed; top: -10%; right: -10%; width: 500px; height: 500px; background: rgba(0, 219, 231, 0.08); filter: blur(100px); border-radius: 50%; pointer-events: none; }
    .glow-b { position: fixed; bottom: -5%; left: -5%; width: 400px; height: 400px; background: rgba(185, 199, 228, 0.05); filter: blur(80px); border-radius: 50%; pointer-events: none; }
    header {
      position: relative; z-index: 1;
      border-bottom: 1px solid #44474d;
      background: #101415;
      padding: 16px 32px;
    }
    .brand { display: flex; align-items: center; gap: 8px; max-width: 1440px; margin: 0 auto; }
    .brand .material-symbols-outlined { color: #b9c7e4; font-size: 28px; }
    .brand span { font-family: "Public Sans", sans-serif; font-size: 20px; font-weight: 600; color: #b9c7e4; }
    main {
      flex: 1; position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 20px;
    }
    .card {
      width: 100%; max-width: 420px;
      background: rgba(29, 32, 34, 0.8);
      border: 1px solid #44474d;
      backdrop-filter: blur(12px);
      padding: 40px 36px;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: #00dbe7;
      border: 1px solid rgba(0, 219, 231, 0.3);
      background: rgba(0, 219, 231, 0.05);
      padding: 4px 12px; border-radius: 999px;
      margin-bottom: 20px;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #00dbe7; }
    h1 {
      font-family: "Public Sans", sans-serif;
      font-size: 28px; font-weight: 700; line-height: 1.2;
      margin-bottom: 8px;
    }
    .subtitle { color: #c5c6cd; font-size: 15px; line-height: 1.5; margin-bottom: 28px; }
    label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #c5c6cd; margin-bottom: 8px; }
    input[type="password"] {
      width: 100%; padding: 14px 16px;
      background: #191c1e; border: 1px solid #44474d;
      color: #e0e3e5; font-size: 16px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #00dbe7; }
    .error { color: #ffb4ab; font-size: 13px; margin-top: 10px; min-height: 20px; }
    button[type="submit"] {
      width: 100%; margin-top: 24px; padding: 16px;
      background: #00dbe7; color: #00363a;
      border: none; font-size: 12px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button[type="submit"]:hover { background: rgba(0, 219, 231, 0.9); }
    button[type="submit"]:active { transform: scale(0.98); }
    footer {
      position: relative; z-index: 1;
      border-top: 1px solid #44474d;
      padding: 12px 32px;
      text-align: center;
      font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: #8f9097;
    }
  </style>
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="glow-a" aria-hidden="true"></div>
  <div class="glow-b" aria-hidden="true"></div>

  <header>
    <div class="brand">
      <span class="material-symbols-outlined">insights</span>
      <span>Phoenix Digital Assistant</span>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="badge"><span class="badge-dot"></span> Internal Use Only</div>
      <h1>Secure Briefing Access</h1>
      <p class="subtitle">Enter the access password to view the executive presentation deck.</p>
      <form id="login-form" autocomplete="off">
        <label for="password">Access Password</label>
        <input id="password" type="password" name="password" placeholder="Enter password" autofocus required />
        <p class="error" id="error" role="alert"></p>
        <button type="submit">
          Enter Briefing
          <span class="material-symbols-outlined" style="font-size:18px">arrow_forward</span>
        </button>
      </form>
    </div>
  </main>

  <footer>Encrypted Protocol · Leadership Review · Highly Confidential</footer>

  <script src="js/auth-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    if (SiteAuth.isAuthenticated()) {
      location.replace("presentation.html");
    }

    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();
      var input = document.getElementById("password");
      var error = document.getElementById("error");
      error.textContent = "";

      if (await SiteAuth.verifyPassword(input.value)) {
        SiteAuth.setAuthenticated();
        location.replace("presentation.html");
      } else {
        error.textContent = "Incorrect password. Please try again.";
        input.value = "";
        input.focus();
      }
    });
  </script>
</body>
</html>
